kind = "web"
previewPath = "/"
title = "Razoraman Docs"
version = "1.0.0"
id = "artifacts/razoraman"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20577

[services.development]
run = "pnpm --filter @workspace/razoraman run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/razoraman", "run", "build" ]
serve = "static"
publicDir = "artifacts/razoraman/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20577"
BASE_PATH = "/"
